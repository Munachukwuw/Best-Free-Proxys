name: Update Validated Proxy Lists

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl

      - name: Fetch & Validate Proxies
        run: |
          echo "Fetching proxies..."

          > raw.txt
          > proxies.txt

          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=http >> raw.txt || true
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=https >> raw.txt || true
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks4 >> raw.txt || true
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks5 >> raw.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt >> raw.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks4.txt >> raw.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt >> raw.txt || true

          sort -u raw.txt -o raw.txt

          echo "Validating proxies (1 second timeout)..."

          while read proxy; do
            timeout 1 curl -x "$proxy" -s https://api.ipify.org > /dev/null 2>&1 || true
            if [ $? -eq 0 ]; then
              echo "$proxy" >> proxies.txt
            fi
          done < raw.txt

          sort -u proxies.txt -o proxies.txt

      - name: Commit & Push if changed
        run: |
          git config --global user.name "ghostedmy"
          git config --global user.email "contact@ghosted.my"

          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Auto update validated proxy list"
            git push
          else
            echo "No changes"
          fi
