name: Update Free Proxy Lists

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Proxies
        run: |
          echo "Fetching proxies..."

          # Clear old files
          > http.txt
          > https.txt
          > socks4.txt
          > socks5.txt

          # HTTP
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=http >> http.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt >> http.txt || true

          # HTTPS
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=https >> https.txt || true

          # SOCKS4
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks4 >> socks4.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks4.txt >> socks4.txt || true

          # SOCKS5
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks5 >> socks5.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt >> socks5.txt || true

          sed -i '/^$/d' http.txt
          sed -i '/^$/d' https.txt
          sed -i '/^$/d' socks4.txt
          sed -i '/^$/d' socks5.txt

          sort -u http.txt -o http.txt
          sort -u https.txt -o https.txt
          sort -u socks4.txt -o socks4.txt
          sort -u socks5.txt -o socks5.txt

      - name: Commit & Push
        run: |
          git config --global user.name "ghosted"
          git config --global user.email "bot@github.com"

          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Auto update proxy lists"
            git push
          else
            echo "No changes"
          fi
