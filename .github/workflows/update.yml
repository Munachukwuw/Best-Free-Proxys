name: Update Free Proxy Lists

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Raw Proxies
        run: |
          echo "Fetching raw proxies..."

          # HTTP
          > http_raw.txt
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=http >> http_raw.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt >> http_raw.txt || true

          # HTTPS
          > https_raw.txt
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=https >> https_raw.txt || true

          # SOCKS4
          > socks4_raw.txt
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks4 >> socks4_raw.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks4.txt >> socks4_raw.txt || true

          # SOCKS5
          > socks5_raw.txt
          curl -s https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks5 >> socks5_raw.txt || true
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt >> socks5_raw.txt || true

          sort -u http_raw.txt -o http_raw.txt
          sort -u https_raw.txt -o https_raw.txt
          sort -u socks4_raw.txt -o socks4_raw.txt
          sort -u socks5_raw.txt -o socks5_raw.txt

      - name: Validate Proxies
        run: |
          echo "Validating proxies..."

          set +e

          > http.txt
          > https.txt
          > socks4.txt
          > socks5.txt

          validate_list () {
            input=$1
            output=$2

            while read proxy; do
              timeout 2 curl -x "$proxy" -s https://api.ipify.org > /dev/null 2>&1
              if [ $? -eq 0 ]; then
                echo "$proxy" >> $output
              fi
            done < $input

            # Fallback falls leer
            if [ ! -s $output ]; then
              cp $input $output
            fi

            sort -u $output -o $output
          }

          validate_list http_raw.txt http.txt
          validate_list https_raw.txt https.txt
          validate_list socks4_raw.txt socks4.txt
          validate_list socks5_raw.txt socks5.txt

          cat http.txt https.txt socks4.txt socks5.txt | sort -u > proxies.txt

          set -e

      - name: Commit & Push if changed
        run: |
          git config --global user.name "proxy-bot"
          git config --global user.email "bot@github.com"

          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Auto update proxy lists"
            git push
          else
            echo "No changes"
          fi
